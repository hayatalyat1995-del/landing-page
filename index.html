<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Where Winds Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
color:white;
background:black;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-2;
}

/* CENTER CONTENT */

.container{

height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

}

/* TITLE */

h1{

font-family:'Cinzel',serif;
font-size:75px;
color:gold;

text-shadow:0 0 40px gold;

}

/* SUBTITLE */

p{

margin-top:15px;
font-size:20px;
color:#ddd;

}

/* INSTALL BUTTON */

.install{

margin-top:40px;

}

.install button{

background:linear-gradient(90deg,#ffd700,#ffb700);

border:none;

padding:20px 70px;

font-size:24px;
font-weight:bold;

border-radius:10px;

cursor:pointer;

animation:pulse 2s infinite;

transition:0.3s;

}

.install button:hover{

transform:scale(1.1);

box-shadow:0 0 40px gold;

}

@keyframes pulse{

0%{box-shadow:0 0 5px gold;}
50%{box-shadow:0 0 35px gold;}
100%{box-shadow:0 0 5px gold;}

}

/* BADGES */

.system-box{

display:flex;
gap:20px;
margin-top:25px;
flex-wrap:wrap;
justify-content:center;

}

.badge{

background:rgba(0,0,0,0.6);

border:1px solid rgba(255,215,0,0.4);

padding:12px 25px;

border-radius:30px;

font-size:16px;

color:#ddd;

box-shadow:0 0 15px rgba(255,215,0,0.2);

transition:0.3s;

}

.badge:hover{

transform:scale(1.08);

box-shadow:0 0 25px gold;

color:white;

}

</style>

</head>

<body>

<!-- VIDEO BACKGROUND -->

<video autoplay loop class="bg-video">
<source src="video/gameplay.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<h1>Where Winds Meet</h1>

<p>Enter the World of Legendary Martial Arts</p>

<div class="install">

<button onclick="installGame()">
Install Game
</button>

</div>

<div class="system-box">

<div class="badge">
💻 Windows PC Only
</div>

<div class="badge">
🎮 Free To Play
</div>

</div>

</div>

<script>

function installGame(){

window.location.href="https://to.wendiro.com/u?k=9db47141846349488810b469b5a18a32&via=29533";

}

</script>

</body>
</html>
